<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activity Travel Protocol</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { max-width: 640px; padding: 48px 24px; text-align: center; }
    .badge { display: inline-block; font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #64b5f6; border: 1px solid #64b5f6; border-radius: 4px; padding: 4px 10px; margin-bottom: 32px; }
    h1 { font-size: 36px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 16px; color: #f8fafc; }
    .tagline { font-size: 18px; color: #94a3b8; line-height: 1.6; margin-bottom: 48px; }
    .links { display: flex; flex-direction: column; gap: 16px; align-items: center; }
    .link-primary { display: inline-block; background: #64b5f6; color: #0f1117; font-weight: 700; font-size: 16px; padding: 14px 32px; border-radius: 8px; text-decoration: none; width: 100%; max-width: 320px; }
    .link-primary:hover { background: #90caf9; }
    .link-secondary { display: inline-block; border: 1px solid #334155; color: #94a3b8; font-size: 15px; padding: 13px 32px; border-radius: 8px; text-decoration: none; width: 100%; max-width: 320px; }
    .link-secondary:hover { border-color: #64b5f6; color: #e2e8f0; }
    .footer { margin-top: 64px; font-size: 13px; color: #475569; }
    .footer a { color: #475569; text-decoration: none; }
    .footer a:hover { color: #94a3b8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">Open Protocol</div>
    <h1>Activity Travel Protocol</h1>
    <p class="tagline">Open specification for activity travel booking interoperability — identity, catalog, booking, payments, fulfillment, and post-trip.</p>
    <div class="links">
      <a class="link-primary" href="https://activitytravel.pro">Read the Specification</a>
      <a class="link-secondary" href="https://github.com/activity-travel-protocol/protocol-spec">View on GitHub</a>
    </div>
    <div class="footer">
      Apache 2.0 &nbsp;·&nbsp; Founded by <a href="https://myauberge.jp">MyAuberge</a>, Hakuba/Chino, Japan &nbsp;·&nbsp; <a href="https://activitytravel.pro">activitytravel.pro</a>
    </div>
  </div>
</body>
</html>
